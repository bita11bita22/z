worker_processes auto;
worker_rlimit_nofile 32768;
pid /tmp/nginx.pid;
error_log /tmp/nginx_error.log warn;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # فرمت لاگ: ایپی مستقیم + هدر X-Forwarded-For (که پلتفرم‌هایی مثل Railway ایپی واقعی کاربر را در آن می‌گذارند) + ترافیک + نوع پروتکل
    # از | به‌عنوان جداکننده استفاده شده چون X-Forwarded-For می‌تواند چند ایپی با کاما/فاصله داشته باشد
    log_format traffic '$remote_addr|$http_x_forwarded_for|$body_bytes_sent';
    log_format traffic_ws '$remote_addr|$http_x_forwarded_for|$body_bytes_sent|ws';
    log_format traffic_xh '$remote_addr|$http_x_forwarded_for|$body_bytes_sent|xhttp';
    log_format traffic_grpc '$remote_addr|$http_x_forwarded_for|$body_bytes_sent|grpc';
    log_format traffic_hu '$remote_addr|$http_x_forwarded_for|$body_bytes_sent|hu';
    log_format traffic_tj '$remote_addr|$http_x_forwarded_for|$body_bytes_sent|trojan';
    log_format traffic_vm '$remote_addr|$http_x_forwarded_for|$body_bytes_sent|vmess';
    # buffer=32k flush=5s: نوشتن لاگ بافر می‌شود تا زیر بار بالا (سرعت ۶ مگ و ۱۰۰ کاربر)
    # هر درخواست یک write جداگانه به دیسک/tmp نزند. این هم I/O و هم رشد لحظه‌ای فایل لاگ روی
    # /tmp (که در بعضی محیط‌ها رم‌محور است) را به‌شدت کم می‌کند. تاخیر ۵ ثانیه‌ای برای تشخیص آی‌پی بی‌اثر است.
    access_log /tmp/nginx_access.log traffic buffer=32k flush=5s;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 120;
    keepalive_requests 10000;
    reset_timedout_connection on;
    
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # سقف بافر هر اتصال را پایین نگه می‌داریم تا با ۱۰۰+ کاربر هم‌زمان، مصرف رم نگینکس
    # به‌جای رشد خطی با تعداد اتصالات، محدود و قابل پیش‌بینی بماند.
    proxy_buffer_size 8k;
    proxy_buffers 8 8k;
    proxy_busy_buffers_size 16k;

    upstream panel_backend { server 127.0.0.1:5000; keepalive 32; }
    upstream xray_ws { server 127.0.0.1:18080; keepalive 32; }
    upstream xray_xh { server 127.0.0.1:18081; keepalive 32; }
    upstream xray_grpc { server 127.0.0.1:18083; keepalive 32; }
    upstream xray_hu { server 127.0.0.1:18084; keepalive 32; }
    upstream xray_tj { server 127.0.0.1:18085; keepalive 32; }
    upstream xray_vm { server 127.0.0.1:18086; keepalive 32; }

    server {
        listen PORT_PLACEHOLDER;
        server_name _;

        location /nginx_status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }

        location /xh {
            proxy_pass http://xray_xh;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            access_log /tmp/nginx_access.log traffic_xh buffer=32k flush=5s;
        }

        location /ws {
            proxy_pass http://xray_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            access_log /tmp/nginx_access.log traffic_ws buffer=32k flush=5s;
        }

        location /grpc {
            if ($content_type !~ "application/grpc") { return 404; }
            grpc_read_timeout 1h;
            grpc_send_timeout 1h;
            client_max_body_size 0;
            client_body_buffer_size 512k;
            proxy_buffering off;
            proxy_http_version 1.1;
            access_log /tmp/nginx_access.log traffic_grpc buffer=32k flush=5s;
            grpc_pass grpc://xray_grpc;
        }

        location /hu {
            proxy_pass http://xray_hu;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            access_log /tmp/nginx_access.log traffic_hu buffer=32k flush=5s;
        }

        location /tj {
            proxy_pass http://xray_tj;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            access_log /tmp/nginx_access.log traffic_tj buffer=32k flush=5s;
        }

        location /vm {
            proxy_pass http://xray_vm;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            access_log /tmp/nginx_access.log traffic_vm buffer=32k flush=5s;
        }

        location / {
            proxy_pass http://panel_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }
    }
}